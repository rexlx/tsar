<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Archive Explorer Pro</title>
    <script src="wasm_exec.js"></script>
    <style>
        :root {
            --primary: #0078d4;
            --bg: #f3f2f1;
            --surface: #ffffff;
            --text: #323130;
            --border: #edebe9;
            --hover: #f3f2f1;
            --header-bg: #ffffff;
            --table-header: #f3f2f1;
            --status-bg: #f3f2f1;
            --accent-text: #605e5c;
            --input-bg: #ffffff;
            --info-bg: #fff4ce;
            --info-text: #323130;
        }

        [data-theme="dark"] {
            --bg: #1b1a19;
            --surface: #252423;
            --text: #f3f2f1;
            --border: #3b3a39;
            --hover: #323130;
            --header-bg: #252423;
            --table-header: #323130;
            --status-bg: #1b1a19;
            --accent-text: #a19f9d;
            --input-bg: #3b3a39;
            --info-bg: #3b3a39;
            --info-text: #f3f2f1;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            transition: background 0.2s;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%; max-width: 1000px;
            background: var(--surface);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex; flex-direction: column;
            height: 100%;
        }

        header { 
            padding: 20px; 
            border-bottom: 1px solid var(--border);
            background: var(--header-bg);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 { margin: 0; font-weight: 600; font-size: 1.2rem; }
        
        .tutorial-box {
            background: var(--info-bg);
            color: var(--info-text);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            line-height: 1.5;
        }
        .tutorial-title {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
        
        button {
            padding: 8px 14px; cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface); 
            color: var(--text);
            border-radius: 4px;
            font-size: 13px; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        button:hover:not(:disabled) { background: var(--hover); }
        button.primary { background: var(--primary); color: white; border: none; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .password-box {
            display: flex; align-items: center; gap: 8px;
            padding-left: 12px; border-left: 1px solid var(--border);
        }

        input[type="password"] {
            padding: 7px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 13px;
            width: 140px;
        }

        .file-list-container {
            flex: 1; overflow-y: auto;
            background: var(--surface);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { 
            position: sticky; top: 0; background: var(--table-header); 
            text-align: left; padding: 12px; font-size: 11px;
            text-transform: uppercase; color: var(--accent-text);
            z-index: 10;
        }
        td { 
            padding: 10px 12px; 
            border-bottom: 1px solid var(--border); 
            font-size: 13px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        tr:hover { background: var(--hover); }
        .checkbox-col { width: 45px; text-align: center; }

        footer { 
            padding: 8px 20px; background: var(--status-bg); 
            font-size: 12px; color: var(--accent-text); 
            display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-top">
            <h2>Archive Manager</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="downloadRecoveryScript()">🛠️ Recovery Script</button>
                <button onclick="toggleTheme()" id="themeBtn">🌓 Appearance</button>
            </div>
        </div>
        
        <div class="toolbar">
            <button onclick="openArchive()">📁 Inspect Archive</button>
            <button onclick="createArchive('zip')">📦 Create .zip</button>
            <button onclick="createArchive('tgz')">📦 Create .tar.gz</button>
            <button id="extractBtn" class="primary" onclick="extractSelected()" disabled>📥 Extract</button>
            
            <div class="password-box">
                <input type="password" id="pw" placeholder="AES Password">
                <label style="font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                    <input type="checkbox" id="fullEnc"> Wrap (.enc)
                </label>
            </div>
        </div>
    </header>

    <div class="tutorial-box">
        <span class="tutorial-title">Quick Start</span>
        To password protect a zip, enter a password first, and then select <b>Create .zip</b>. tar does not support password protection.
        <br>
        <span style="opacity: 0.8;"><b>Advanced:</b> Enable extra encryption by checking "Wrap (.enc)". This produces a <b>.zip.enc</b> or <b>.tar.gz.enc</b> file.</span>
    </div>

    <div class="file-list-container">
        <table>
            <thead>
                <tr>
                    <th class="checkbox-col"><input type="checkbox" id="selectAll" onclick="toggleAll()"></th>
                    <th>File Name</th>
                </tr>
            </thead>
            <tbody id="fileListBody"></tbody>
        </table>
    </div>

    <footer>
        <span id="statusBar">Initializing WASM...</span>
        <span id="fileCount">0 items</span>
    </footer>
</div>

<script>
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('archive-theme', theme);
    }
    function toggleTheme() {
        const current = localStorage.getItem('archive-theme') === 'dark' ? 'light' : 'dark';
        setTheme(current);
    }
    setTheme(localStorage.getItem('archive-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

    const go = new Go();
    let archiveBuffer = null;
    let archiveFormat = "";
    const log = (m) => document.getElementById('statusBar').innerText = m;

    WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
        go.run(result.instance);
        log("WASM System Online.");
    }).catch(err => log("WASM Error: " + err.message));

    function checkWasm() {
        if (typeof listArchive !== 'function') {
            alert("Archive logic is still initializing. Please wait a moment.");
            return false;
        }
        return true;
    }

    async function openArchive() {
        if (!checkWasm()) return;
        try {
            const [h] = await window.showOpenFilePicker();
            const f = await h.getFile();
            let bytes = new Uint8Array(await f.arrayBuffer());
            
            if (f.name.endsWith('.enc')) {
                const password = document.getElementById('pw').value;
                if (!password) return alert("Please enter the decryption key in the password field.");
                
                log("Decrypting container...");
                const decrypted = decryptWrap(bytes, password);
                if (!decrypted) return alert("Decryption failed. Incorrect password or corrupted file.");
                
                bytes = decrypted;
                log("Container decrypted.");
            }

            if (bytes[0] === 0x50 && bytes[1] === 0x4B) {
                archiveFormat = 'zip';
            } else if (bytes[0] === 0x1F && bytes[1] === 0x8B) {
                archiveFormat = 'tgz';
            } else {
                archiveFormat = 'tgz';
            }

            archiveBuffer = bytes;
            const list = listArchive(archiveBuffer, archiveFormat);
            
            renderFileList(list || []);
            log(`Loaded: ${f.name} (${archiveFormat.toUpperCase()})`);
        } catch (e) { if (e.name !== 'AbortError') log("Error: " + e.message); }
    }

    function renderFileList(files) {
        const body = document.getElementById('fileListBody');
        body.innerHTML = files.length ? '' : '<tr><td colspan="2" style="text-align:center; padding:20px; opacity:0.5;">No files found.</td></tr>';
        document.getElementById('extractBtn').disabled = true;
        document.getElementById('fileCount').innerText = `${files.length} items`;
        
        files.forEach((name) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="checkbox-col"><input type="checkbox" class="file-check" data-name="${name}" onchange="updateUI()"></td>
                <td title="${name}">${name}</td>
            `;
            body.appendChild(row);
        });
    }

    function updateUI() {
        const checked = document.querySelectorAll('.file-check:checked');
        const btn = document.getElementById('extractBtn');
        btn.disabled = checked.length === 0;
        btn.innerText = `📥 Extract (${checked.length})`;
    }

    function toggleAll() {
        const master = document.getElementById('selectAll');
        document.querySelectorAll('.file-check').forEach(cb => cb.checked = master.checked);
        updateUI();
    }

    async function extractSelected() {
        const checked = document.querySelectorAll('.file-check:checked');
        const password = document.getElementById('pw').value;
        if (!checked.length) return;

        try {
            const destDir = await window.showDirectoryPicker();
            log(`Extracting ${checked.length} files...`);

            for (const cb of checked) {
                const path = cb.getAttribute('data-name');
                if (path.endsWith('/')) continue; 

                const bytes = extractFile(archiveBuffer, path, archiveFormat, password);
                if (!bytes) {
                    log(`Extraction failed for: ${path}`);
                    continue;
                }

                const parts = path.split('/').filter(p => p.length > 0);
                let currentHandle = destDir;
                for (let i = 0; i < parts.length - 1; i++) {
                    currentHandle = await currentHandle.getDirectoryHandle(parts[i], { create: true });
                }
                const filename = parts[parts.length - 1];
                
                const fileHandle = await currentHandle.getFileHandle(filename, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(bytes);
                await writable.close();
            }
            log("Task finished.");
        } catch (e) { if (e.name !== 'AbortError') log("Error: " + e.message); }
    }

    async function createArchive(formatType) {
        if (!checkWasm()) return;
        const password = document.getElementById('pw').value;
        const useFullWrap = document.getElementById('fullEnc').checked;

        try {
            const dirHandle = await window.showDirectoryPicker();
            const filesMap = {};

            async function scan(handle, path = "") {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        const f = await entry.getFile();
                        filesMap[path + f.name] = new Uint8Array(await f.arrayBuffer());
                    } else if (entry.kind === 'directory') {
                        await scan(entry, path + entry.name + "/");
                    }
                }
            }

            log("Scanning local directory...");
            await scan(dirHandle);
            
            log("Generating archive bytes...");
            let bytes = compressFiles(filesMap, formatType, useFullWrap ? "" : password);
            
            const archiveExt = (formatType === 'tgz' ? '.tar.gz' : '.zip');
            let finalName = `${dirHandle.name}${archiveExt}`;

            if (useFullWrap && password) {
                log("Wrapping in AES-GCM container...");
                bytes = encryptWrap(bytes, password);
                finalName = `${finalName}.enc`;
            }

            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([bytes]));
            a.download = finalName;
            a.click();
            log(`Archive ready: ${finalName}`);
        } catch (e) { if (e.name !== 'AbortError') log("Creation error: " + e.message); }
    }

    function downloadRecoveryScript() {
        const script = `"""
RECOVERY SCRIPT FOR .ENC ARCHIVES
---------------------------------
INSTALLATION:
Windows: pip install cryptography
macOS:   python3 -m pip install cryptography --break-system-packages
Linux:   pip install cryptography
"""
import os, sys, getpass
from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC
from cryptography.hazmat.primitives import hashes
from cryptography.hazmat.primitives.ciphers.aead import AESGCM

def recover():
    if len(sys.argv) < 2:
        print("Usage: python decrypt.py <filename.enc>")
        return
    
    path = sys.argv[1]
    if not os.path.exists(path):
        print(f"Error: {path} not found.")
        return

    password = getpass.getpass(f"Enter decryption password for {os.path.basename(path)}: ")

    with open(path, 'rb') as f:
        data = f.read()

    if len(data) < 28:
        print("Error: File is too small to be a valid .enc archive.")
        return

    salt, nonce, ciphertext = data[:16], data[16:28], data[28:]

    kdf = PBKDF2HMAC(
        algorithm=hashes.SHA256(),
        length=32,
        salt=salt,
        iterations=100000
    )
    key = kdf.derive(password.encode())

    try:
        aesgcm = AESGCM(key)
        plain = aesgcm.decrypt(nonce, ciphertext, None)
        
        if path.lower().endswith('.enc'):
            out_name = path[:-4]
        else:
            out_name = path + ".decrypted"
            
        with open(out_name, 'wb') as f:
            f.write(plain)
        
        print(f"\\n[SUCCESS] Decrypted file saved as: {out_name}")
    except Exception as e:
        print(f"\\n[ERROR] Decryption failed: {e}")

if __name__ == "__main__":
    recover()`;

        const blob = new Blob([script], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "decrypt_recovery.py";
        a.click();
    }
</script>
</body>
</html>
